<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Магазин</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Оформление страницы */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--tg-theme-bg-color); /* Используем цвета темы Telegram */
            color: var(--tg-theme-text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #main {
            text-align: center;
            padding: 20px;
        }

        img {
            width: 150px;
            height: auto;
            margin: 20px 0;
            border-radius: 15px;
        }

        h1 {
            font-size: 24px;
            margin: 10px 0;
        }

        p {
            font-size: 16px;
            color: var(--tg-theme-hint-color);
        }

        button {
            border: 0;
            border-radius: 10px;
            margin-top: 20px;
            height: 50px;
            width: 200px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            background-color: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            transition: all 0.2s ease;
        }

        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div id="main">
        <h1>Онлайн магазин</h1>
        <img src="https://cdn-icons-png.flaticon.com/512/3595/3595455.png" alt="Товар">
        <p>Крутой товар для твоего обучения программированию!</p>
        <button id="buy">Купить</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp; // Получаем объект WebApp

        tg.expand(); // Разворачиваем на все окно

        let btn = document.getElementById("buy");

        // Обработка нажатия на кнопку
        btn.addEventListener("click", function(){
            // Отправляем данные боту и закрываем окно
            tg.sendData("item_purchased"); 
        });
    </script>
</body>
</html>
